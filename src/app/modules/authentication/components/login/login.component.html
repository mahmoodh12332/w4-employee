<div class="row h-100 align-items-center justify-content-center">
  <div class="col-lg-4 col-md-5 col-sm-7">
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <mat-card class="py-5">
        <div class="text-center mb-4">
          <img width="200" alt="LOGO" src="../../../../../assets/img/logo.png">
        </div>
        <mat-card-header class="m-0">
          <mat-card-title class="m-0">
            New W4 form
          </mat-card-title>
          <mat-card-subtitle class="m-0">
            Pacesetter Personnel's web W4 form may only be completed
          </mat-card-subtitle>
        </mat-card-header>
        <div class="p-3">
          <mat-card-content>
            <mat-form-field class="w-100 mb-2">
              <input
                matInput
                type="text"
                [mask]="'000-00-0000'"
                [showMaskTyped]="true"
                [clearIfNotMatch]="true"
                placeholder="Social Number"
                formControlName="ssn"
                required>
              <mat-error *ngIf="loginForm.controls.ssn.hasError('required')">
                Social Number is required.
              </mat-error>
              <mat-error *ngIf="!loginForm.controls.ssn.valid && !loginForm.controls.ssn.hasError('required')">
                Invalid value.
              </mat-error>
            </mat-form-field>
            <mat-form-field class="w-100 mb-2">
              <input
                max="10"
                matInput
                placeholder="Date of Birth"
                formControlName="dob"
                [max]="maxValue"
                [min]="minValue"
                required [matDatepicker]="picker">
              <mat-hint>MM/DD/YYYY</mat-hint>
              <mat-error *ngIf="loginForm.controls.dob.hasError('required')">
                Date of Birth is required.
              </mat-error>
              <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
              <mat-datepicker startView="multi-year" touchUi #picker [disabled]="false"></mat-datepicker>
            </mat-form-field>
            <!-- <mat-form-field class="w-100 mb-2">
              <input
                type="date"
                max="10"
                matInput
                placeholder="Date of Birth"
                formControlName="dob"
                required>

            </mat-form-field> -->
          </mat-card-content>
          <mat-card-actions>
            <button mat-raised-button color="primary" class="float-right" [disabled]="submitting">Submit</button>
          </mat-card-actions>
        </div>
      </mat-card>
    </form>
  </div>
</div>

<ng-template #DialogOverviewExampleDialog>
  <h1 class="text-center mt-4 text-danger" mat-dialog-title style="font-size: 36px;">Something went wrong. </h1>
  <div mat-dialog-content>
    <p class="text-center" style="font-size: 18px;">DOB does not match.</p>
    <p class="text-center" style="font-size: 14px;">Note: Please check your "Social Security Number" and "Date of Birthday".</p>
  </div>
  <div class="text-center d-block" mat-dialog-actions>
    <button mat-raised-button color="primary"  [mat-dialog-close] (click)="refreshData()">Try Again</button>
  </div>
</ng-template>
