<div class="employment-form">
  <div class="container">
    <div class="row">
      <div class="col-md-8 offset-md-2 offset-lg-2 offset-sm-0 mt-5 mb-5">
        <mat-card>
          <mat-vertical-stepper [linear]="true" #stepper>
            <ng-container *ngFor="let step of stepFormGroups;let currentStep = index">
              <mat-step [stepControl]="step.formGroup">
                <form [formGroup]="step.formGroup">
                  <ng-template matStepLabel>{{step.label}}</ng-template>
                  <div class="row">
                    <ng-container *ngFor="let field of step.fields">
                      <div class="col-md-6 col-sm-12">
                        <mat-form-field class="w-100">
                          <input matInput
                                 [disabled]="field.disabled"
                                 [mask]="field.isMasked ? field.mask : ''"
                                 [showMaskTyped]="field.isMasked"
                                 [clearIfNotMatch]="field.isMasked"
                                 [placeholder]="field.label"
                                 [formControl]="field.formControl"
                                 [required]="field.required"
                                 [email]="!!field.isEmail"
                          >
                        </mat-form-field>
                      </div>
                    </ng-container>
                  </div>
                  <div class="row">
                    <div class="col-12 text-right">
                      <ng-container *ngIf="currentStep !== 0">
                        <button mat-raised-button matStepperPrevious>Back</button>
                      </ng-container>
                      <button mat-raised-button color="primary" matStepperNext>Next</button>
                    </div>
                  </div>
                </form>
              </mat-step>
            </ng-container>
            <mat-step>
              <ng-template matStepLabel>Done</ng-template>
              <div>
                <button mat-button matStepperPrevious>Back</button>
                <button mat-button mat-raised-button color="primary">Submit</button>
              </div>
            </mat-step>
          </mat-vertical-stepper>
        </mat-card>
      </div>
    </div>
  </div>
</div>
