<div class="employment-form">
  <div class="container">
    <div class="row">
      <div class="col-md-8 offset-md-2 offset-lg-2 offset-sm-0 mt-5 mb-5">
        <mat-card>
          <mat-vertical-stepper (selectionChange)="onStepperSelectionChange($event)" [linear]="true" #stepper>
            <ng-container *ngFor="let step of stepFormGroups;let currentStep = index">
              <mat-step [stepControl]="step.formGroup">
                <form [formGroup]="step.formGroup">
                  <ng-template matStepLabel>{{step.label}}</ng-template>
                  <div class="row">
                    <ng-container *ngFor="let field of step.fields">
                      <app-employment-form-field
                        [ngClass]="{
                        'col-md-6 col-sm-12': field.type !== 'signature' && field.type !== 'document' && field.type !== 'submit' && field.type !== 'radioButton' && field.type !== 'group',
                        'w-100': field.type === 'date',
                        'col-12': field.type == 'signature' || field.type === 'radioButton' || field.type === 'group' || field.type === 'document' || field.type === 'submit'
                        }"
                        *ngIf="field.formControl.enabled || field.id === 'bi-ssn'"
                        [step]="step"
                        [field]="field"
                        [formData]="this.formValue"
                        (submitForm)="submitForm()"
                      ></app-employment-form-field>
                    </ng-container>
                  </div>
                  <div class="row">
                    <div class="col-12">
                      
                      
                      <div class="float-left w-100 text-center">
                        <div  *ngIf="currentStep !== 0">
                          <button class="float-left"  mat-raised-button matStepperPrevious>Back</button>
                        </div>
                        <!-- *******Start employment-application****** -->
                        <div  class="float-right" *ngIf="stepFormGroups.length === 10">
                            <button mat-raised-button  color="primary" matStepperNext *ngIf="currentStep !== stepFormGroups.length - 1">Next</button>
                        </div>
                        <!-- *******End employment-application*** -->
                        <!-- ********************************************* -->
                        <!------- Start employment-contract --------->
                        <div class="float-right" *ngIf="stepFormGroups.length === 16">
                          <div   *ngIf="currentStep !== 14">
                            <button mat-raised-button  color="primary" matStepperNext *ngIf="currentStep !== stepFormGroups.length - 1">I agree, Next</button>
                          </div>
                        </div>
                        
                        <div style="display: inline-block" *ngIf="currentStep !== 15">
                          <button mat-raised-button color="danger" class="btn-danger mx-1"   *ngIf="stepFormGroups.length === 16" >I disagree</button>
                        </div>

                        <div class="float-right" *ngIf="currentStep === 14">
                          <button mat-raised-button color="primary" matStepperNext >Let’s Sign Contract</button>
                        </div>

                        <div class="float-right" *ngIf="currentStep === 15">
                            <button mat-raised-button  class="btn-primary ml-1" color="primary"  >Submit</button>
                          </div>
                        <!------- End employment-contract --------->
                      </div>
                    </div>
                  </div>
                </form>
              </mat-step>
            </ng-container>
          </mat-vertical-stepper>

        </mat-card>
      </div>
    </div>
  </div>
</div>
