<div class="container">
  <div class="row">
    <div class="col-md-5 col-sm-12 offset-md-1 offset-lg-1 offset-sm-0 mb-2 mt-5">
      <button mat-raised-button color="default" routerLink="/dashboard/employment-w4-form">
        <span class="icon-arrow-left2"></span>
        Back To W4 Form
      </button>
    </div>
    <div class="col-md-5 col-sm-12">
      <app-exit-modal-component class="float-sm-none float-md-right mb-md-2 mb-sm-0 mt-md-5 mt-sm-0"></app-exit-modal-component>
    </div>
  </div>
</div>
<app-employment-form
  [dataValues]="formValues"
  [steps]="steps"
  [showNextButton]="false"
  [showBackButton]="false"
  [isSubmitting]="isSubmitting"
  
  (formSubmit)="onFormSubmit($event)"></app-employment-form>
<ng-template #DialogOverviewExampleDialog>
  <div class="text-center">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="green" style="width: 140px;"><!-- Font Awesome Pro 5.15.4 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license (Commercial License) --><path d="M504 256c0 136.967-111.033 248-248 248S8 392.967 8 256 119.033 8 256 8s248 111.033 248 248zM227.314 387.314l184-184c6.248-6.248 6.248-16.379 0-22.627l-22.627-22.627c-6.248-6.249-16.379-6.249-22.628 0L216 308.118l-70.059-70.059c-6.248-6.248-16.379-6.248-22.628 0l-22.627 22.627c-6.248 6.248-6.248 16.379 0 22.627l104 104c6.249 6.249 16.379 6.249 22.628.001z"/></svg>
  </div>
  <h1 class="text-center mt-4" mat-dialog-title style="font-size: 36px;">Thank You</h1>
  <div mat-dialog-content>
    <p class="text-center" style="font-size: 18px;">W4-Form Submitted Successfully.</p>
  </div>
  <div class="text-center d-block" mat-dialog-actions>
    <button mat-raised-button color="primary"  [mat-dialog-close] (click)="onNoClick()">Back to Home</button>
  </div>
</ng-template>
