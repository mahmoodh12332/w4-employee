<div class="container">
  <div class="row">
    <div class="col-md-10 offset-md-1 offset-lg-1 offset-sm-0 mb-2 mt-5">
      <button mat-raised-button color="default" routerLink="/dashboard/employment-application">
        <span class="icon-arrow-left2"></span>
        Back To Application Form
      </button>
      <app-exit-modal-component class="float-right"></app-exit-modal-component>
    </div>
  </div>
</div>
<app-employment-form
  [dataValues]="formValues"
  [steps]="steps"
  [showNextButton]="false"
  [showBackButton]="false"
  (formSubmit)="onFormSubmit($event)">
</app-employment-form>
